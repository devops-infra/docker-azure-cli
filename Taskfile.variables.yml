version: '3'

silent: true

env:
  DOCKER_BUILDKIT: '1'
  TERM: xterm-256color

vars:
  SED:
    sh: |
      if [ "$(uname -s)" = "Darwin" ]; then
        if command -v gsed >/dev/null 2>&1; then
          echo gsed
        else
          if command -v brew >/dev/null 2>&1; then
            brew list gnu-sed >/dev/null 2>&1 || {
              HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_ANALYTICS=1 brew update >/dev/null 2>&1 || true
              HOMEBREW_NO_ENV_HINTS=1 HOMEBREW_NO_ANALYTICS=1 brew install gnu-sed >/dev/null 2>&1
            }
            echo gsed
          else
            echo sed
          fi
        fi
      else
        echo sed
      fi
  PROJECT_DIR_NAME:
    sh: basename "$PWD"
  DEFAULT_BRANCH:
    sh: |
      if [ -n "${DEFAULT_BRANCH:-}" ]; then
        printf "%s\n" "${DEFAULT_BRANCH}"
      elif branch_ref="$(git symbolic-ref --quiet --short refs/remotes/origin/HEAD 2>/dev/null)"; then
        printf "%s\n" "${branch_ref#origin/}"
      elif current_branch="$(git symbolic-ref --quiet --short HEAD 2>/dev/null)" && { [ "${current_branch}" = "main" ] || [ "${current_branch}" = "master" ]; }; then
        printf "%s\n" "${current_branch}"
      elif git show-ref --verify --quiet refs/heads/main || git show-ref --verify --quiet refs/remotes/origin/main; then
        echo main
      elif git show-ref --verify --quiet refs/heads/master || git show-ref --verify --quiet refs/remotes/origin/master; then
        echo master
      else
        echo master
      fi
  VERSION_SUFFIX:
    sh: echo "${VERSION_SUFFIX:-}"
  VERSION_OVERRIDE:
    sh: echo "${VERSION_OVERRIDE:-}"
  AZ_VERSION:
    sh: sed -nE 's/^ARG AZ_VERSION=([0-9.]+)$/\1/p' Dockerfile | head -1
  VERSION:
    sh: |
      if [ -n "${VERSION_OVERRIDE:-}" ]; then
        printf "%s" "${VERSION_OVERRIDE}"
      else
        printf "%s" "{{.AZ_VERSION}}"
      fi
  VERSION_FULL: '{{.VERSION}}'
  VERSION_MINOR:
    sh: printf "%s" "{{.VERSION}}" | awk -F. '{print $1 "." $2}'
  VERSION_TAG: '{{.VERSION_FULL}}{{.VERSION_SUFFIX}}'
  DOCKER_USERNAME:
    sh: echo "${DOCKER_USERNAME:-christophshyper}"
  DOCKER_ORG_NAME:
    sh: echo "${DOCKER_ORG_NAME:-devopsinfra}"
  DOCKER_IMAGE: docker-azure-cli
  DOCKER_NAME: '{{.DOCKER_ORG_NAME}}/{{.DOCKER_IMAGE}}'
  GITHUB_USERNAME:
    sh: echo "${GITHUB_USERNAME:-ChristophShyper}"
  GITHUB_ORG_NAME:
    sh: echo "${GITHUB_ORG_NAME:-devops-infra}"
  GITHUB_REPO: docker-azure-cli
  GITHUB_NAME: ghcr.io/{{.GITHUB_ORG_NAME}}/{{.GITHUB_REPO}}
  HOST_PLATFORM:
    sh: |
      case "$(uname -m)" in
        x86_64) echo linux/amd64 ;;
        aarch64|arm64) echo linux/arm64 ;;
        *) echo linux/amd64 ;;
      esac
  PLATFORMS_LOCAL: '{{.PLATFORMS_LOCAL | default .HOST_PLATFORM}}'
  PLATFORMS: '{{.PLATFORMS | default "linux/amd64,linux/arm64"}}'
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  GIT_SHA:
    sh: git rev-parse HEAD 2>/dev/null || echo 0000000000000000000000000000000000000000
  LABEL_AUTHOR: Krzysztof ChristophShyper Szyper <biotyk@mail.com>
  LABEL_NAME: Alpine Azure CLI base image
  LABEL_DESCRIPTION: Minimal Alpine-based Azure CLI image for downstream DevOps-Infra containers.
  LABEL_REPO_URL: https://github.com/devops-infra/docker-azure-cli
  LABEL_DOCS_URL: https://github.com/devops-infra/docker-azure-cli/blob/{{.DEFAULT_BRANCH}}/README.md
  LABEL_HOMEPAGE: https://shyper.pro
  LABEL_VENDOR: DevOps-Infra
  LABEL_LICENSE: MIT
  DOCKERFILE: Dockerfile
  EXACT_TAG: '{{.VERSION_FULL}}{{.VERSION_SUFFIX}}'
  MINOR_TAG: '{{.VERSION_MINOR}}{{.VERSION_SUFFIX}}'
  LATEST_TAG: 'latest{{.VERSION_SUFFIX}}'
